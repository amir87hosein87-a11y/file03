name: ⬇️ new-Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip

jobs:
  save-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install aria2, zip and curl
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl

      - name: AVASAM Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM - Your Download Solution"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          SPLIT_THRESHOLD_MB=90
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          echo "🏷️  AVASAM (https://avasam.ir) - Downloading with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB (automatic)"

          mkdir -p downloads tmp_downloads

          # Function to get unique filename/foldername
          get_unique_name() {
            local BASE_PATH="$1"
            local NAME="$2"
            local IS_FOLDER="$3"
            
            if [ "$IS_FOLDER" = "true" ]; then
              if [ ! -d "$BASE_PATH/$NAME" ]; then
                echo "$NAME"
                return
              fi
              local COUNTER=1
              while [ -d "$BASE_PATH/${NAME}_${COUNTER}" ]; do
                COUNTER=$((COUNTER + 1))
              done
              echo "${NAME}_${COUNTER}"
            else
              if [ ! -f "$BASE_PATH/$NAME" ]; then
                echo "$NAME"
                return
              fi
              local EXTENSION="${NAME##*.}"
              local BASENAME="${NAME%.*}"
              if [ "$EXTENSION" = "$NAME" ]; then
                # No extension
                local COUNTER=1
                while [ -f "$BASE_PATH/${NAME}_${COUNTER}" ]; do
                  COUNTER=$((COUNTER + 1))
                done
                echo "${NAME}_${COUNTER}"
              else
                local COUNTER=1
                while [ -f "$BASE_PATH/${BASENAME}_${COUNTER}.${EXTENSION}" ]; do
                  COUNTER=$((COUNTER + 1))
                done
                echo "${BASENAME}_${COUNTER}.${EXTENSION}"
              fi
            fi
          }

          # Function to resolve SourceForge and similar redirect URLs
          resolve_download_url() {
            local URL="$1"
            local RESOLVED_URL="$URL"
            
            # Check if it's a SourceForge URL
            if [[ "$URL" == *"sourceforge.net"* ]]; then
              echo "🔄 Detected SourceForge URL, resolving direct download link..." >&2
              # SourceForge direct download URL pattern
              if [[ "$URL" != *"/download" ]]; then
                RESOLVED_URL="${URL}/download"
              fi
              # Follow redirects to get the actual mirror URL
              local FINAL_URL=$(curl -sIL -o /dev/null -w '%{url_effective}' --max-time 30 "$RESOLVED_URL" 2>/dev/null)
              if [ -n "$FINAL_URL" ] && [[ "$FINAL_URL" != "$RESOLVED_URL" ]]; then
                echo "🔗 Resolved to: $FINAL_URL" >&2
                RESOLVED_URL="$FINAL_URL"
              fi
            fi
            
            echo "$RESOLVED_URL"
          }

          # Function to download with retry and error handling
          download_file() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            local RETRY_DELAY=5
            local SUCCESS=false
            local ERROR_MSG=""
            
            # Resolve URL (handle SourceForge, etc.)
            local RESOLVED_URL=$(resolve_download_url "$URL")
            
            for ((ATTEMPT=1; ATTEMPT<=MAX_RETRIES; ATTEMPT++)); do
              echo "⬇️ Attempt $ATTEMPT/$MAX_RETRIES: Downloading $RESOLVED_URL -> $FILENAME"
              
              # Use aria2c with better options for problematic servers
              ERROR_OUTPUT=$(aria2c \
                --split=2 \
                --max-connection-per-server=2 \
                --min-split-size=20M \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                --max-tries=3 \
                --retry-wait=5 \
                --timeout=60 \
                --connect-timeout=30 \
                --follow-torrent=false \
                --check-certificate=false \
                --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                --header="Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
                --header="Accept-Language: en-US,en;q=0.5" \
                --allow-overwrite=true \
                "$RESOLVED_URL" 2>&1)
              
              ARIA_EXIT_CODE=$?
              
              if [ $ARIA_EXIT_CODE -eq 0 ] && [ -f "tmp_downloads/$FILENAME" ]; then
                SUCCESS=true
                echo "✅ Downloaded successfully: $FILENAME"
                break
              else
                ERROR_MSG="$ERROR_OUTPUT"
                echo "⚠️ Attempt $ATTEMPT failed with exit code $ARIA_EXIT_CODE"
                
                # If aria2c fails, try curl as fallback
                if [ $ATTEMPT -eq $MAX_RETRIES ]; then
                  echo "🔄 Trying curl as fallback..."
                  CURL_ERROR=$(curl -L -o "tmp_downloads/$FILENAME" \
                    --max-time 300 \
                    --retry 3 \
                    --retry-delay 5 \
                    -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                    -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
                    "$RESOLVED_URL" 2>&1)
                  
                  if [ $? -eq 0 ] && [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                    SUCCESS=true
                    echo "✅ Downloaded successfully with curl: $FILENAME"
                    break
                  else
                    ERROR_MSG="$ERROR_MSG\n\nCurl fallback also failed:\n$CURL_ERROR"
                  fi
                fi
                
                if [ $ATTEMPT -lt $MAX_RETRIES ]; then
                  echo "⏳ Waiting ${RETRY_DELAY}s before retry..."
                  sleep $RETRY_DELAY
                  RETRY_DELAY=$((RETRY_DELAY * 2))
                fi
              fi
            done
            
            if [ "$SUCCESS" = false ]; then
              echo "❌ All download attempts failed for: $FILENAME"
              # Create error file
              local ERROR_FILENAME=$(get_unique_name "downloads" "${FILENAME}.download_error.txt" "false")
              {
                echo "=========================================="
                echo "AVASAM DOWNLOAD ERROR REPORT"
                echo "=========================================="
                echo ""
                echo "Original URL: $URL"
